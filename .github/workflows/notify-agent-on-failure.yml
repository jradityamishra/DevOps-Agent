name: Notify Agent on Failure

on:
  workflow_run:
    workflows: ["Vercel Deploy"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  send-logs:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download failed run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          mkdir -p logs
          curl -sSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/logs" \
            -o logs/logs.zip
          unzip -o logs/logs.zip -d logs > /dev/null
          find logs -type f \( -name "*.txt" -o -name "*.log" \) -exec cat {} \; > logs/all.log

          # Keep only the last 2000 lines as candidate window.
          tail -n 2000 logs/all.log > logs/window.log

          # Strip ANSI color codes and GitHub Actions timestamps for cleaner input.
          sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' logs/window.log \
            | sed -E 's/^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:.]+Z[[:space:]]*//' \
            > logs/clean.log

          # Extract only error-relevant lines with 3 lines before and 5 after as context.
          grep -E -n -B 3 -A 5 -i \
            "error|failed|failure|exception|fatal|denied|not found|cannot|unable|\[error\]|##\[error\]|exit code [1-9]" \
            logs/clean.log > logs/errors.log || true

          # If nothing matched, fall back to the last 200 cleaned lines.
          if [ ! -s logs/errors.log ]; then
            tail -n 200 logs/clean.log > logs/errors.log
          fi

          # Safety cap: at most 2000 lines and 16 KB.
          head -n 2000 logs/errors.log | head -c 16000 > logs/trimmed.log

          echo "Log size: $(wc -l < logs/trimmed.log) lines, $(wc -c < logs/trimmed.log) bytes"

      - name: Send logs to Agent
        env:
          AGENT_API_URL: ${{ secrets.AGENT_API_URL }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -e
          {
            echo "Repository: $REPO"
            echo "Branch: $BRANCH"
            echo "Failed Run: $RUN_URL"
            echo ""
            echo "--- LOGS ---"
            cat logs/trimmed.log
          } > logs/payload.txt

          LOGS=$(jq -Rs . < logs/payload.txt)
          SESSION=$(cat /proc/sys/kernel/random/uuid)
          jq -n \
            --argjson logs "$LOGS" \
            --arg sid "$SESSION" \
            '{output_type:"chat", input_type:"chat", input_value:$logs, session_id:$sid}' \
            > logs/body.json

          # Ensure stream=false is set on the agent URL to avoid gateway timeouts.
          if [[ "$AGENT_API_URL" == *"?"* ]]; then
            FINAL_URL="${AGENT_API_URL}&stream=false"
          else
            FINAL_URL="${AGENT_API_URL}?stream=false"
          fi

          HTTP_CODE=$(curl -sS -o logs/agent-response.json -w "%{http_code}" \
            --max-time 600 \
            -L --post301 --post302 --post303 \
            -X POST "$FINAL_URL" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "x-api-key: $AGENT_API_KEY" \
            --data-binary @logs/body.json)

          echo "HTTP status: $HTTP_CODE"

          # Extract only the agent's message text from the nested response.
          jq -r '
            .outputs[0].outputs[0].results.message.text
            // .outputs[0].outputs[0].results.message.data.text
            // .output
            // "No analysis text returned."
          ' logs/agent-response.json > logs/analysis.txt

          echo "Agent analysis:"
          cat logs/analysis.txt

      - name: Upload agent analysis as artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-failure-analysis
          path: logs/analysis.txt
